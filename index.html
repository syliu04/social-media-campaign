<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title id="page-title">Instagram</title>
    <link
      id="favicon"
      rel="icon"
      type="image/png"
      href="account_profile_photo.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <!-- Top bar (desktop) -->
    <header class="ig-topbar" role="banner">
      <div class="ig-topbar__inner">
        <a class="ig-logo" href="#" aria-label="Instagram">Instagram</a>
        <div class="ig-search">
          <input
            type="text"
            placeholder="Search"
            aria-label="Search"
            disabled
          />
        </div>
        <nav class="ig-nav" aria-label="Primary">
          <button class="ig-nav__btn" title="Home" aria-label="Home">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M22 23h-6.001a1 1 0 0 1-1-1v-5.455a2.997 2.997 0 1 0-5.993 0V22a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V11.543a1.002 1.002 0 0 1 .31-.724l10-9.543a1.001 1.001 0 0 1 1.38 0l10 9.543a1.002 1.002 0 0 1 .31.724V22a1 1 0 0 1-1 1z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
            </svg>
          </button>
          <button class="ig-nav__btn" title="Messages" aria-label="Messages">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
              <path d="M12 2.5C6.753 2.5 2.5 6.527 2.5 11.5c0 2.726 1.275 5.165 3.286 6.815L4.5 22l4.013-2.041c1.106.355 2.28.541 3.487.541 5.247 0 9.5-4.027 9.5-9 0-4.973-4.253-9-9.5-9z"/>
              <polyline points="7 11.7 10.5 13.7 12.5 9.9 17 12.5"/>
            </svg>
          </button>
          <button class="ig-nav__btn" title="New post" aria-label="New post">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12v3.45c0 2.849.698 4.005 1.606 4.944.94.909 2.098 1.608 4.946 1.608h6.896c2.848 0 4.006-.7 4.946-1.608C21.302 19.455 22 18.3 22 15.45V8.552c0-2.849-.698-4.006-1.606-4.945C19.454 2.7 18.296 2 15.448 2H8.552c-2.848 0-4.006.699-4.946 1.607C2.698 4.547 2 5.703 2 8.552Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
              <line fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" x1="6.545" x2="17.455" y1="12.001" y2="12.001"/>
              <line fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" x1="12.003" x2="12.003" y1="6.545" y2="17.455"/>
            </svg>
          </button>
          <button class="ig-nav__btn" title="Activity" aria-label="Activity">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M16.792 3.904A4.989 4.989 0 0 1 21.5 9.122c0 3.072-2.652 4.959-5.197 7.222-2.512 2.243-3.865 3.469-4.303 3.752-.477-.309-2.143-1.823-4.303-3.752C5.141 14.072 2.5 12.167 2.5 9.122a4.989 4.989 0 0 1 4.708-5.218 4.21 4.21 0 0 1 3.675 1.941c.84 1.175.98 1.763 1.12 1.763s.278-.588 1.11-1.766a4.17 4.17 0 0 1 3.679-1.938Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
            </svg>
          </button>
          <button class="ig-nav__avatar" title="Profile" aria-label="Profile">
            <img src="account_profile_photo.png" data-avatar alt="Profile" />
          </button>
        </nav>
      </div>
    </header>

    <main class="ig-main">
      <!-- Profile header -->
      <section class="profile" aria-label="Profile">
        <div class="profile__avatar-wrap">
          <div class="profile__avatar">
            <img src="account_profile_photo.png" data-avatar alt="Behind The Algorithm profile photo" />
          </div>
        </div>

        <div class="profile__info">
          <div class="profile__row1">
            <h1 class="profile__username" data-bind="username">behindthealgorithm</h1>
            <div class="profile__actions">
              <button class="btn btn--primary" type="button">Follow</button>
              <button class="btn" type="button">Message</button>
              <button class="btn btn--icon" type="button" aria-label="Suggested">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <polyline points="16.502 3 21 3.001 21 7.502" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
                  <line x1="20.999" y1="3.001" x2="14.475" y2="9.525" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
                  <path d="M11 3H7.243C5.452 3 4 4.452 4 6.243v11.514C4 19.548 5.452 21 7.243 21h11.514C20.548 21 22 19.548 22 17.757V14" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
                </svg>
              </button>
              <button class="btn btn--icon" type="button" aria-label="Options">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <polyline fill="none" points="16.479 4.021 19.979 4.021 19.979 7.521" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
                  <path d="M4.103 19.876s.876-2.529 5.381-4.81C13.989 12.785 17.022 8.66 18.745 5.36" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
                </svg>
              </button>
            </div>
          </div>

          <ul class="profile__stats" aria-label="Account statistics">
            <li><strong data-bind="posts">0</strong> posts</li>
            <li><strong data-bind="followers">0</strong> followers</li>
            <li><strong data-bind="following">0</strong> following</li>
          </ul>

          <div class="profile__bio">
            <div class="profile__name" data-bind="name">Name</div>
            <div class="profile__category" data-bind="category">Category</div>
            <p class="profile__bio-text" data-bind="bio"></p>
            <a class="profile__link" data-bind-href="link" href="#" rel="noopener">
              <svg viewBox="0 0 24 24" aria-hidden="true" class="profile__link-icon">
                <line fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2" x1="16.96" x2="21.05" y1="2.95" y2="7.05"/>
                <path d="m2.95 18.31 5.83-5.83a4.34 4.34 0 0 1 6.14 0l5.84 5.84M2 22h20" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
              </svg>
              <span data-bind="linkLabel"></span>
            </a>
          </div>
        </div>
      </section>

      <!-- Profile actions on mobile -->
      <div class="profile__mobile-actions">
        <button class="btn btn--primary btn--block" type="button">Follow</button>
        <button class="btn btn--block" type="button">Message</button>
        <button class="btn btn--icon" type="button" aria-label="Suggested">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="16.502 3 21 3.001 21 7.502" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
            <line x1="20.999" y1="3.001" x2="14.475" y2="9.525" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
            <path d="M11 3H7.243C5.452 3 4 4.452 4 6.243v11.514C4 19.548 5.452 21 7.243 21h11.514C20.548 21 22 19.548 22 17.757V14" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
          </svg>
        </button>
      </div>

      <!-- Stats row for mobile -->
      <ul class="profile__mobile-stats" aria-label="Account statistics">
        <li><strong data-bind="posts">0</strong><span>posts</span></li>
        <li><strong data-bind="followers">0</strong><span>followers</span></li>
        <li><strong data-bind="following">0</strong><span>following</span></li>
      </ul>

      <!-- Story highlights -->
      <section class="highlights" aria-label="Story highlights" id="highlights">
        <!-- JS will inject highlight items here -->
      </section>

      <!-- Tabs -->
      <nav class="tabs" aria-label="Profile tabs">
        <button class="tab tab--active" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect fill="none" height="18" stroke="currentColor" stroke-linejoin="round" stroke-width="2" width="18" x="3" y="3"/>
            <line fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2" x1="9.015" x2="9.015" y1="3" y2="21"/>
            <line fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2" x1="14.985" x2="14.985" y1="3" y2="21"/>
            <line fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2" x1="21" x2="3" y1="9.015" y2="9.015"/>
            <line fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2" x1="21" x2="3" y1="14.985" y2="14.985"/>
          </svg>
          <span>POSTS</span>
        </button>
        <button class="tab" type="button" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m12.823 1 2.974 5.002h-5.95Zm-2.679 5.002L13.118 1h-2.974L7.17 6.002Zm9.404 0L16.572 1h-2.974l2.974 5.002ZM1.5 7.002v13.996A2 2 0 0 0 3.5 23h17a2 2 0 0 0 2-2V7.002Zm13.453 7.685-4.973 2.91a.5.5 0 0 1-.75-.432v-5.82a.5.5 0 0 1 .75-.433l4.973 2.91a.5.5 0 0 1 0 .865Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
          </svg>
          <span>REELS</span>
        </button>
        <button class="tab" type="button" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10.201 3.797 12 1.997l1.799 1.8a1.59 1.59 0 0 0 1.124.465h5.259A2.818 2.818 0 0 1 23 7.07v14.118a2.818 2.818 0 0 1-2.818 2.818H3.818A2.818 2.818 0 0 1 1 21.188V7.07a2.818 2.818 0 0 1 2.818-2.808h5.26a1.59 1.59 0 0 0 1.123-.465Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
            <circle cx="12" cy="12.508" fill="none" r="4.853" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
          </svg>
          <span>TAGGED</span>
        </button>
      </nav>

      <!-- Posts grid -->
      <section class="grid" id="grid" aria-label="Posts">
        <!-- JS injects post tiles -->
      </section>

      <!-- Hashtag results "page" (shown when the URL is #tag/<name>) -->
      <section class="tagview" id="tag-view" aria-label="Hashtag results" hidden>
        <!-- JS injects header + matching post tiles -->
      </section>

      <footer class="ig-footer">
        <p>© 2026 BEHIND THE ALGORITHM · A student-led campaign mockup</p>
      </footer>
    </main>

    <!-- POST MODAL -->
    <div class="modal" id="post-modal" aria-hidden="true" role="dialog" aria-modal="true">
      <button class="modal__close" id="post-modal-close" aria-label="Close">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <line fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" x1="21" x2="3" y1="3" y2="21"/>
          <line fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" x1="21" x2="3" y1="21" y2="3"/>
        </svg>
      </button>
      <div class="modal__shell" role="document">
        <div class="post">
          <div class="post__media" id="post-media">
            <!-- carousel slides injected -->
          </div>

          <aside class="post__side">
            <header class="post__header">
              <div class="post__author">
                <img src="account_profile_photo.png" data-avatar alt="" />
                <div>
                  <div class="post__username" data-bind="username">behindthealgorithm</div>
                  <div class="post__location" data-bind="postLocation">AI ethics</div>
                </div>
              </div>
              <button class="post__more" aria-label="More options">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                  <circle cx="6" cy="12" r="1.5" fill="currentColor"/>
                  <circle cx="18" cy="12" r="1.5" fill="currentColor"/>
                </svg>
              </button>
            </header>

            <div class="post__body" id="post-body">
              <!-- caption injected -->
            </div>

            <div class="post__actions">
              <div class="post__actions-left">
                <button class="iconbtn" aria-label="Like">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M16.792 3.904A4.989 4.989 0 0 1 21.5 9.122c0 3.072-2.652 4.959-5.197 7.222-2.512 2.243-3.865 3.469-4.303 3.752-.477-.309-2.143-1.823-4.303-3.752C5.141 14.072 2.5 12.167 2.5 9.122a4.989 4.989 0 0 1 4.708-5.218 4.21 4.21 0 0 1 3.675 1.941c.84 1.175.98 1.763 1.12 1.763s.278-.588 1.11-1.766a4.17 4.17 0 0 1 3.679-1.938Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
                  </svg>
                </button>
                <button class="iconbtn" aria-label="Comment">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M20.656 17.008a9.993 9.993 0 1 0-3.59 3.615L22 22Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
                  </svg>
                </button>
                <button class="iconbtn" aria-label="Share">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <line fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2" x1="22" x2="9.218" y1="3" y2="10.083"/>
                    <polygon fill="none" points="11.698 20.334 22 3.001 2 3.001 9.218 10.084 11.698 20.334" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
                  </svg>
                </button>
              </div>
              <button class="iconbtn" aria-label="Save">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <polygon fill="none" points="20 21 12 13.44 4 21 4 3 20 3 20 21" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
                </svg>
              </button>
            </div>

            <div class="post__meta">
              <div class="post__likes">Liked by <strong>algoresearcher</strong> and <strong>others</strong></div>
              <div class="post__time">2 days ago</div>
            </div>

            <div class="post__comment-bar">
              <input type="text" placeholder="Add a comment..." disabled />
              <button type="button" class="post__post-btn" disabled>Post</button>
            </div>
          </aside>
        </div>
      </div>
    </div>

    <!-- STORY VIEWER -->
    <div class="story-viewer" id="story-viewer" aria-hidden="true" role="dialog" aria-modal="true">
      <div class="story-viewer__shell">
        <div class="story-viewer__progress" id="story-progress"></div>
        <header class="story-viewer__header">
          <div class="story-viewer__author">
            <img src="account_profile_photo.png" data-avatar alt="" />
            <span data-bind="username">behindthealgorithm</span>
            <span class="story-viewer__time">· now</span>
          </div>
          <button class="story-viewer__close" id="story-close" aria-label="Close">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <line fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" x1="21" x2="3" y1="3" y2="21"/>
              <line fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" x1="21" x2="3" y1="21" y2="3"/>
            </svg>
          </button>
        </header>
        <div class="story-viewer__stage" id="story-stage">
          <button class="story-viewer__tap story-viewer__tap--left" id="story-prev" aria-label="Previous"></button>
          <img class="story-viewer__img" id="story-image" alt="Story slide" />
          <button class="story-viewer__tap story-viewer__tap--right" id="story-next" aria-label="Next"></button>
        </div>
        <div class="story-viewer__reply">
          <input type="text" placeholder="Reply to behindthealgorithm…" disabled />
          <button class="iconbtn" aria-label="Like">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M16.792 3.904A4.989 4.989 0 0 1 21.5 9.122c0 3.072-2.652 4.959-5.197 7.222-2.512 2.243-3.865 3.469-4.303 3.752-.477-.309-2.143-1.823-4.303-3.752C5.141 14.072 2.5 12.167 2.5 9.122a4.989 4.989 0 0 1 4.708-5.218 4.21 4.21 0 0 1 3.675 1.941c.84 1.175.98 1.763 1.12 1.763s.278-.588 1.11-1.766a4.17 4.17 0 0 1 3.679-1.938Z" fill="none" stroke="white" stroke-linejoin="round" stroke-width="2"/>
            </svg>
          </button>
          <button class="iconbtn" aria-label="Share">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <line fill="none" stroke="white" stroke-linejoin="round" stroke-width="2" x1="22" x2="9.218" y1="3" y2="10.083"/>
              <polygon fill="none" points="11.698 20.334 22 3.001 2 3.001 9.218 10.084 11.698 20.334" stroke="white" stroke-linejoin="round" stroke-width="2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Mobile bottom nav -->
    <nav class="bottom-nav" aria-label="Mobile">
      <button aria-label="Home">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M22 23h-6.001a1 1 0 0 1-1-1v-5.455a2.997 2.997 0 1 0-5.993 0V22a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V11.543a1.002 1.002 0 0 1 .31-.724l10-9.543a1.001 1.001 0 0 1 1.38 0l10 9.543a1.002 1.002 0 0 1 .31.724V22a1 1 0 0 1-1 1z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
        </svg>
      </button>
      <button aria-label="Search">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19 10.5A8.5 8.5 0 1 1 10.5 2a8.5 8.5 0 0 1 8.5 8.5Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
          <line fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2" x1="16.511" x2="22" y1="16.511" y2="22"/>
        </svg>
      </button>
      <button aria-label="New post">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M2 12v3.45c0 2.849.698 4.005 1.606 4.944.94.909 2.098 1.608 4.946 1.608h6.896c2.848 0 4.006-.7 4.946-1.608C21.302 19.455 22 18.3 22 15.45V8.552c0-2.849-.698-4.006-1.606-4.945C19.454 2.7 18.296 2 15.448 2H8.552c-2.848 0-4.006.699-4.946 1.607C2.698 4.547 2 5.703 2 8.552Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
          <line fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" x1="6.545" x2="17.455" y1="12.001" y2="12.001"/>
          <line fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" x1="12.003" x2="12.003" y1="6.545" y2="17.455"/>
        </svg>
      </button>
      <button aria-label="Reels">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m12.823 1 2.974 5.002h-5.95Zm-2.679 5.002L13.118 1h-2.974L7.17 6.002Zm9.404 0L16.572 1h-2.974l2.974 5.002ZM1.5 7.002v13.996A2 2 0 0 0 3.5 23h17a2 2 0 0 0 2-2V7.002Z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2"/>
        </svg>
      </button>
      <button aria-label="Profile" class="bottom-nav__profile">
        <img src="account_profile_photo.png" data-avatar alt="Profile" />
      </button>
    </nav>

    <!--
      To add or remove posts/stories: edit assets/config.js only.
      That file is the single source of truth for what appears on this page.
    -->
    <script src="assets/config.js"></script>
    <script src="assets/loader.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
